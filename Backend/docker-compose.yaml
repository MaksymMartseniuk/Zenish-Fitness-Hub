version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: zenith_postgres_db
    restart: always
    environment:
      POSTGRES_USER: zenith_user
      POSTGRES_PASSWORD: zenith_password
      POSTGRES_DB: zenith_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: zenith_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: